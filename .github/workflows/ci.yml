name: CI

on:
  push:
    branches: [main]
  # No base-branch filter: run on every PR, including stacked Story->Epic PRs
  # (base = epic/*) and Epic->main PRs. Closes the gap where non-main-base PRs
  # were not CI-gated (ADR-0002).
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --all-extras

      - name: Lint
        run: uv run poe lint

      - name: Type check
        run: uv run poe typecheck

      - name: Test
        run: uv run poe test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  build-check:
    needs: [python, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Verify wheel contents
        run: python scripts/verify_wheel.py

      - name: Check distribution metadata
        run: uvx --from twine twine check dist/*

  plugin-validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Validate plugin structure
        run: |
          if command -v claude &> /dev/null; then
            claude plugin validate .
          else
            echo "::warning::claude CLI not available, skipping plugin validation"
          fi
